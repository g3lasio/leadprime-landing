<!doctype html>

  <head>
    <meta charset="UTF-8" />

    <!-- Primary SEO -->

            "price": "15.00",

        },
        {
          "@type": "Offer",
          "name": "Network Elite",
          "price": "249.00",
          "priceCurrency": "USD",

            "@type": "UnitPriceSpecification",

    <!-- Structured Data — Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "LeadPrime",
      "url": "https://lead-prime.chyrris.com/",
      "logo": "https://lead-prime.chyrris.com/logo.png",
      "sameAs": [],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "url": "https://leadprime.chyrris.com"

    <!-- Structured Data — FAQPage for SEO snippets -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is LeadPrime?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "LeadPrime is an AI-powered CRM built specifically for Contractors, Property Managers, Investors, Realtors, Lenders, and Wholesalers. It automates lead follow-up, manages campaigns across SMS, email, and voice, and connects professionals through the LeadPrime Network."
          }
        },
        {
          "@type": "Question",
          "name": "How much does LeadPrime cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "LeadPrime starts at $15/month (pay-as-you-go, no hidden fees). The Network Elite plan is $249/month and includes full B2B network access, OWL FENC Suite with $500 credits, networking events in Las Vegas, San Francisco, and Miami, business financing access, and more. All plans include a 90-day free trial."
          }
        },
        {
          "@type": "Question",
          "name": "What is the LeadPrime Network?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The LeadPrime Network is a verified B2B hub connecting Contractors, Property Managers, Investors, Realtors, Lenders, and Wholesalers nationwide. Members get access to government, state, federal, and residential projects, plus exclusive networking events and business financing."
          }
        },
        {
          "@type": "Question",
          "name": "What is the Founding Member program?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The first 100 members per city earn the Founding Member badge for life, priority placement in the network, and locked-in pricing forever. The program includes 90 days completely free — no credit card required."
          }
        }
      ]
    }
    </script>
